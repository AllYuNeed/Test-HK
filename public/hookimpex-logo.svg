<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Industrial gear shape -->
  <circle cx="50" cy="50" r="35" fill="url(#logoGradient)"/>

  <!-- Hook icon in center -->
  <g transform="translate(50, 50)">
    <!-- Hook shape -->
    <path d="M -10,-15 L -10,5 Q -10,15 0,15 Q 10,15 10,5 L 10,-5"
          stroke="white"
          stroke-width="4"
          fill="none"
          stroke-linecap="round"/>

    <!-- Letter H integrated into design -->
    <rect x="-15" y="-20" width="3" height="25" fill="white" opacity="0.8"/>
    <rect x="12" y="-20" width="3" height="25" fill="white" opacity="0.8"/>
    <rect x="-15" y="-10" width="30" height="3" fill="white" opacity="0.8"/>
  </g>

  <!-- Outer ring decoration -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#logoGradient)" stroke-width="2" opacity="0.5"/>
</svg>
